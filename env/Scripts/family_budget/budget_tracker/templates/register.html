{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 500px;">
        <h2>Setup Shared Account</h2>
        <p>Create a single joint ledger designed for unified tracking.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Family Login ID</label>
                <input type="text" name="username" id="username" class="form-control" required placeholder="e.g., sharma_family">
            </div>
            <div class="form-group">
                <label for="password">Account Password</label>
                <input type="password" name="password" id="password" class="form-control" required placeholder="Choose a strong password">
            </div>
            
            <div style="border-top: 1px solid var(--border); margin: 1.5rem 0; padding-top: 1rem;">
                <h4 style="margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--primary-light);">Companion Configuration</h4>
                
                <div class="form-group">
                    <label for="primary_name">User 1 Name (e.g., Husband)</label>
                    <input type="text" name="primary_name" id="primary_name" class="form-control" required placeholder="e.g., Rajesh">
                </div>
                <div class="form-group">
                    <label for="companion_name">User 2 Name (e.g., Wife)</label>
                    <input type="text" name="companion_name" id="companion_name" class="form-control" required placeholder="e.g., Sunita">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Create Household Ledger</button>
        </form>
        
        <p style="margin-top: 1.5rem; text-align: center;">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--accent); font-weight: 600;">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}
