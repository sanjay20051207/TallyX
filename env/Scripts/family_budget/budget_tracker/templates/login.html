{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Family Login</h2>
        <p>Access your shared household account</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Family ID / Username</label>
                <input type="text" name="username" id="username" class="form-control" required placeholder="e.g., sharma_family">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">Login to Ledger</button>
        </form>
        
        <p style="margin-top: 1.5rem; text-align: center;">
            New family? <a href="{% url 'register' %}" style="color: var(--accent); font-weight: 600;">Setup Account</a>
        </p>
    </div>
</div>
{% endblock %}
