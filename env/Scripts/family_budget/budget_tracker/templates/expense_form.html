{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper" style="min-height: auto; margin-top: 2rem;">
    <div class="auth-card" style="max-width: 550px;">
        <h2>{{ action }} Family Expense</h2>
        <p>Keep your collective records precise.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="amount">Amount (INR)</label>
                <input type="number" step="any" name="amount" id="amount" class="form-control" value="{{ expense.amount }}" required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select name="category" id="category" class="form-control" required>
                    {% for category in categories %}
                        <option value="{{ category }}" {% if expense.category == category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="spender">Logged By (Spender Name)</label>
                <select name="spender" id="spender" class="form-control" required>
                    {% for s in spenders %}
                        <option value="{{ s }}" {% if expense.spender == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date of Transaction</label>
                <input type="date" name="date" id="date" class="form-control" value="{{ expense.date }}" required>
            </div>

            <div class="form-group">
                <label for="description">Short Description</label>
                <input type="text" name="description" id="description" class="form-control" value="{{ expense.description }}" required placeholder="e.g., Weekly medicines or LIC Premium">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">{{ action }} Entry</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="text-align: center; width: 100%;">Back</a>
            </div>
        </form>
    </div>
</div>
<script>
    // Autofill with today's date if adding a new expense
    if (!document.getElementById('date').value) {
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);
    }
</script>
{% endblock %}
